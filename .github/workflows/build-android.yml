name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🌐 Generate localizations
        run: flutter gen-l10n

      - name: 🏗️ Run code generator
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🖼️ Generate launcher icons
        run: flutter pub run flutter_launcher_icons

      - name: 🔑 Setup signing
        shell: bash
        run: |
          if [ -n "$SIGN_KEYSTORE_BASE64" ]; then
            echo "$SIGN_KEYSTORE_BASE64" | base64 --decode > android/app/key.jks
            echo "storeFile=key.jks" >> android/key.properties
            echo "storePassword=$KEYSTORE_PASSWORD" >> android/key.properties
            echo "keyAlias=$KEY_ALIAS" >> android/key.properties
            echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
            echo "✅ Release signing configured"
          else
            echo "ℹ️ No signing key — using debug keystore"
          fi
        env:
          SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 🏗️ Build APK
        run: flutter build apk --release --split-per-abi

      - name: 📦 Rename APKs
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          cd build/app/outputs/flutter-apk
          for file in app-*-release.apk; do
            abi=$(echo "$file" | sed -E 's/app-(.*)-release\.apk/\1/')
            mv "$file" "Kelizo_android_${VERSION}_${abi}.apk"
          done
          echo "✅ APKs renamed"

      - name: 📤 Upload APK (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: Kelizo-arm64-v8a
          path: build/app/outputs/flutter-apk/Kelizo_android_*_arm64-v8a.apk

      - name: 📤 Upload APK (armeabi-v7a)
        uses: actions/upload-artifact@v4
        with:
          name: Kelizo-armeabi-v7a
          path: build/app/outputs/flutter-apk/Kelizo_android_*_armeabi-v7a.apk

      - name: 📤 Upload APK (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: Kelizo-x86_64
          path: build/app/outputs/flutter-apk/Kelizo_android_*_x86_64.apk
