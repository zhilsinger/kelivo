name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  android:
    name: Build Android (split per ABI)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🌐 Generate localizations
        run: flutter gen-l10n

      - name: 🏗️ Run code generator
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🖼️ Generate launcher icons
        run: flutter pub run flutter_launcher_icons

      - name: 📝 Get version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: 🔑 Setup signing (debug)
        run: echo "Using debug signing"

      - name: 🏗️ Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: 📦 Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          for file in app-*-release.apk; do
            abi=$(echo "$file" | sed -E 's/app-(.*)-release\.apk/\1/')
            mv "$file" "Kelizo_android_${VERSION}_${abi}.apk"
          done
          echo "✅ APKs renamed"

      - name: 📤 Upload APK (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: Kelizo-arm64-v8a
          path: build/app/outputs/flutter-apk/Kelizo_android_*_arm64-v8a.apk

      - name: 📤 Upload APK (armeabi-v7a)
        uses: actions/upload-artifact@v4
        with:
          name: Kelizo-armeabi-v7a
          path: build/app/outputs/flutter-apk/Kelizo_android_*_armeabi-v7a.apk

      - name: 📤 Upload APK (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: Kelizo-x86_64
          path: build/app/outputs/flutter-apk/Kelizo_android_*_x86_64.apk
